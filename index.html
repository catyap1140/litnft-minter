<!DOCTYPE html>
<html lang="id" id="htmlRoot">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal NFT</title>
  
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet" />
  
  <!-- Ethers.js -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js">
  </script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  
  <style>
    /* ================================================================
       RESET & VARIABLES
       ================================================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg-body: #0a0a12;
      --bg-card: rgba(255, 255, 255, 0.05);
      --bg-card-hover: rgba(255, 255, 255, 0.08);
      --bg-header: rgba(10, 10, 18, 0.85);
      --bg-stats: linear-gradient(135deg, rgba(124, 58, 237, 0.15), rgba(79, 70, 229, 0.10));
      --bg-input: rgba(255, 255, 255, 0.05);
      --bg-upload: rgba(124, 58, 237, 0.10);
      --bg-upload-hover: rgba(124, 58, 237, 0.20);
      --bg-tab: rgba(255, 255, 255, 0.03);
      --bg-success: rgba(34, 197, 94, 0.10);
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --text-white: #ffffff;
      --text-muted: #6b7280;
      --text-purple: #a78bfa;
      --text-purple-bright: #8b5cf6;
      --border-color: rgba(255, 255, 255, 0.06);
      --border-purple: rgba(124, 58, 237, 0.30);
      --shadow-color: rgba(124, 58, 237, 0.15);
      --glow-color: rgba(124, 58, 237, 0.30);
      --badge-bg: #7c3aed;
      --badge-text: #ffffff;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.06);
    }
    
    /* ================================================================
       LIGHT MODE
       ================================================================ */
    [data-theme="light"] {
      --bg-body: #f3f4f6;
      --bg-card: rgba(255, 255, 255, 0.80);
      --bg-card-hover: rgba(255, 255, 255, 0.95);
      --bg-header: rgba(255, 255, 255, 0.85);
      --bg-stats: linear-gradient(135deg, rgba(124, 58, 237, 0.12), rgba(79, 70, 229, 0.08));
      --bg-input: rgba(255, 255, 255, 0.80);
      --bg-upload: rgba(124, 58, 237, 0.06);
      --bg-upload-hover: rgba(124, 58, 237, 0.12);
      --bg-tab: rgba(255, 255, 255, 0.50);
      --bg-success: rgba(34, 197, 94, 0.10);
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --text-white: #111827;
      --text-muted: #9ca3af;
      --text-purple: #7c3aed;
      --text-purple-bright: #6d28d9;
      --border-color: rgba(0, 0, 0, 0.06);
      --border-purple: rgba(124, 58, 237, 0.20);
      --shadow-color: rgba(124, 58, 237, 0.08);
      --glow-color: rgba(124, 58, 237, 0.15);
      --glass-bg: rgba(255, 255, 255, 0.50);
      --glass-border: rgba(0, 0, 0, 0.06);
    }
    
    /* ================================================================
       GLOBAL
       ================================================================ */
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-body);
      color: var(--text-primary);
      min-height: 100vh;
      transition: all 0.3s ease;
      position: relative;
      overflow-x: hidden;
    }
    
    /* ================================================================
       GRID BACKGROUND
       ================================================================ */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        radial-gradient(circle at 20% 50%, rgba(124, 58, 237, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(79, 70, 229, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 50% 20%, rgba(124, 58, 237, 0.02) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    
    /* ================================================================
       GLASSMORPHISM UTILITY
       ================================================================ */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(1.2);
      -webkit-backdrop-filter: blur(20px) saturate(1.2);
      border: 1px solid var(--glass-border);
    }
    
    .glass-card {
      background: var(--bg-card);
      backdrop-filter: blur(20px) saturate(1.2);
      -webkit-backdrop-filter: blur(20px) saturate(1.2);
      border: 1px solid var(--border-color);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
    }
    
    /* ================================================================
       HEADER
       ================================================================ */
    .header {
      background: var(--bg-header);
      backdrop-filter: blur(20px) saturate(1.2);
      -webkit-backdrop-filter: blur(20px) saturate(1.2);
      border-bottom: 1px solid var(--border-color);
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .logo h1 {
      font-size: 22px;
      font-weight: 900;
      color: var(--text-white);
      letter-spacing: -0.5px;
    }
    
    .logo h1 span {
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .header-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .theme-toggle {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .theme-toggle:hover {
      background: var(--bg-card-hover);
      transform: rotate(20deg) scale(1.05);
      color: var(--text-purple);
    }
    
    .wallet-btn {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
    }
    
    .wallet-btn:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-purple);
      color: var(--text-primary);
      transform: scale(1.02);
    }
    
    .wallet-btn.connected {
      background: var(--text-purple);
      border-color: var(--text-purple);
      color: white;
    }
    
    .wallet-btn.connected:hover {
      background: #dc2626;
      border-color: #dc2626;
      color: white;
    }
    
    /* ================================================================
       STATS BANNER
       ================================================================ */
    .stats-banner {
      background: var(--bg-stats);
      padding: 24px 20px;
      border-bottom: 1px solid var(--border-color);
      position: relative;
      overflow: hidden;
    }
    
    .stats-banner::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.05), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    
    .stats-banner h2 {
      color: var(--text-primary);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      position: relative;
      z-index: 1;
    }
    
    .stat-item {
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
    }
    
    .stat-item .label {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 2px;
    }
    
    .stat-item .value {
      font-size: 20px;
      font-weight: 900;
      color: var(--text-primary);
    }
    
    .stat-item .value .dim {
      opacity: 0.4;
      font-weight: 400;
    }
    
    /* ================================================================
       TABS
       ================================================================ */
    .tabs {
      display: flex;
      background: var(--bg-tab);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 72px;
      z-index: 50;
    }
    
    .tab {
      flex: 1;
      padding: 14px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.3px;
    }
    
    .tab:hover {
      color: var(--text-primary);
    }
    
    .tab.active {
      color: var(--text-purple);
      border-bottom-color: var(--text-purple);
      background: var(--bg-card);
    }
    
    /* ================================================================
       CONTAINER
       ================================================================ */
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px;
      position: relative;
      z-index: 1;
    }
    
    .tab-panel {
      display: none;
      animation: fadeSlide 0.4s ease;
    }
    
    .tab-panel.active { display: block; }
    
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* ================================================================
       MINT CARD
       ================================================================ */
    .mint-card {
      background: var(--bg-card);
      backdrop-filter: blur(20px) saturate(1.2);
      -webkit-backdrop-filter: blur(20px) saturate(1.2);
      border-radius: 20px;
      padding: 24px;
      border: 1px solid var(--border-color);
      box-shadow: 0 8px 32px var(--shadow-color);
      transition: all 0.3s ease;
    }
    
    .mint-card:hover {
      border-color: var(--border-purple);
      box-shadow: 0 8px 40px var(--shadow-color), 0 0 60px var(--glow-color);
    }
    
    .mint-card .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .mint-card .card-header h3 {
      font-size: 18px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }
    
    .badge {
      background: var(--text-purple);
      color: white;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    
    .mint-card input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 12px;
      transition: all 0.3s ease;
      outline: none;
      background: var(--bg-input);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
    }
    
    .mint-card input[type="text"]:focus {
      border-color: var(--text-purple);
      box-shadow: 0 0 0 3px var(--glow-color);
    }
    
    .upload-area {
      width: 100%;
      padding: 20px;
      border: 2px dashed var(--border-purple);
      border-radius: 12px;
      background: var(--bg-upload);
      text-align: center;
      cursor: pointer;
      font-weight: 600;
      color: var(--text-secondary);
      transition: all 0.3s ease;
      margin-bottom: 12px;
    }
    
    .upload-area:hover {
      background: var(--bg-upload-hover);
      border-color: var(--text-purple);
      color: var(--text-primary);
    }
    
    .upload-area .icon {
      font-size: 28px;
      display: block;
      margin-bottom: 4px;
    }
    
    input[type="file"] { display: none; }
    
    #previewImg {
      width: 100%;
      max-height: 250px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 12px;
      display: none;
      border: 2px solid var(--border-purple);
    }
    
    /* PROGRESS */
    .progress-wrap {
      display: none;
      margin-bottom: 12px;
    }
    
    .progress-bar {
      height: 6px;
      background: var(--border-color);
      border-radius: 4px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--text-purple), #f59e0b);
      width: 0%;
      transition: width 0.5s ease;
      border-radius: 4px;
      box-shadow: 0 0 20px var(--glow-color);
    }
    
    .progress-text {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 600;
      margin-top: 6px;
      text-align: center;
    }
    
    /* SUCCESS */
    .success-box {
      background: var(--bg-success);
      border: 1px solid rgba(34, 197, 94, 0.30);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      display: none;
    }
    
    .success-box h4 {
      color: #22c55e;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .success-box p {
      font-size: 12px;
      color: var(--text-secondary);
      word-break: break-all;
    }
    
    .success-box .tx-link {
      color: var(--text-purple);
      text-decoration: none;
      font-weight: 600;
    }
    
    .success-box .tx-link:hover {
      text-decoration: underline;
    }
    
    /* BUTTONS */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase;
    }
    
    .btn-mint {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white;
      box-shadow: 0 4px 20px var(--glow-color);
    }
    
    .btn-mint:hover:not(:disabled) {
      transform: scale(1.02);
      box-shadow: 0 8px 30px var(--glow-color), 0 0 60px var(--glow-color);
    }
    
    .btn-mint:disabled {
      background: var(--border-color);
      color: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
    }
    
    .btn-twitter {
      background: #1DA1F2;
      color: white;
      margin-top: 8px;
      display: none;
    }
    
    .btn-twitter:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 30px rgba(29, 161, 242, 0.30);
    }
    
    #status {
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      margin-top: 10px;
      min-height: 20px;
      color: var(--text-secondary);
    }
    
    /* ================================================================
       GALLERY
       ================================================================ */
    .gallery-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .gallery-header h3 {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }
    
    .gallery-header .count {
      background: var(--bg-card);
      color: var(--text-purple);
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--border-color);
    }
    
    .nft-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    
    .nft-card {
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border-color);
      transition: all 0.4s ease;
    }
    
    .nft-card:hover {
      border-color: var(--border-purple);
      transform: translateY(-6px);
      box-shadow: 0 12px 40px var(--shadow-color), 0 0 40px var(--glow-color);
    }
    
    .nft-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      background: var(--border-color);
      transition: transform 0.4s ease;
    }
    
    .nft-card:hover img {
      transform: scale(1.03);
    }
    
    .nft-card .info {
      padding: 12px;
    }
    
    .nft-card .token-id {
      background: var(--text-purple);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 4px;
    }
    
    .nft-card .name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    
    .nft-card .owner {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
    }
    
    .empty-gallery {
      grid-column: span 2;
      text-align: center;
      padding: 50px 20px;
      color: var(--text-muted);
    }
    
    .empty-gallery .big-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 8px;
    }
    
    .loading-gallery {
      grid-column: span 2;
      text-align: center;
      padding: 40px;
      color: var(--text-purple);
    }
    
    .wallet-required {
      grid-column: span 2;
      text-align: center;
      padding: 40px 20px;
      background: var(--bg-card);
      border-radius: 16px;
      border: 2px dashed var(--border-purple);
    }
    
    .wallet-required .big-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 8px;
    }
    
    .wallet-required p {
      color: var(--text-muted);
      font-weight: 600;
    }
    
    /* ================================================================
       RESPONSIVE
       ================================================================ */
    @media (max-width: 480px) {
      .header { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
      .logo h1 { font-size: 18px; }
      .wallet-btn { font-size: 11px; padding: 8px 14px; }
      .nft-grid { gap: 10px; }
      .nft-card img { height: 120px; }
      .header-controls { gap: 6px; }
      .theme-toggle { width: 34px; height: 34px; font-size: 14px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
    
    @media (max-width: 380px) {
      .container { padding: 12px 10px; }
      .mint-card { padding: 16px; }
      .nft-grid { grid-template-columns: 1fr; }
      .nft-card img { height: 180px; }
    }
  </style>
</head>
<body>

  <!-- ================================================================
       HEADER
       ================================================================ -->
  <header class="header">
    <div class="logo">
      <h1>🖼️ Portal <span>NFT</span></h1>
    </div>
    <div class="header-controls">
      <button class="theme-toggle" id="themeToggle" title="Toggle Dark/Light Mode">
        <i class="fas fa-moon"></i>
      </button>
      <button class="wallet-btn" id="connectBtn">
        <i class="fas fa-wallet"></i> Connect Wallet
      </button>
    </div>
  </header>

  <!-- ================================================================
       STATS BANNER
       ================================================================ -->
  <section class="stats-banner">
    <h2>✨ Mint NFT, Own The Chain!</h2>
    <div class="stats-grid">
      <div class="stat-item">
        <span class="label">Total NFT</span>
        <span class="value" id="totalSupply">?</span>
      </div>
      <div class="stat-item">
        <span class="label">Network</span>
        <span class="value" style="font-size:14px;">LitVM Testnet</span>
      </div>
      <div class="stat-item">
        <span class="label">Wallet</span>
        <span class="value" id="walletDisplay" style="font-size:14px;">-</span>
      </div>
    </div>
  </section>

  <!-- ================================================================
       TABS
       ================================================================ -->
  <div class="tabs">
    <div class="tab active" data-tab="mint" onclick="switchTab('mint')">
      <i class="fas fa-rocket"></i> Mint
    </div>
    <div class="tab" data-tab="gallery" onclick="switchTab('gallery')">
      <i class="fas fa-images"></i> Galeri
    </div>
  </div>

  <!-- ================================================================
       CONTAINER
       ================================================================ -->
  <div class="container">

    <!-- TAB MINT -->
    <div class="tab-panel active" id="panel-mint">
      <div class="mint-card glass-card">
        <div class="card-header">
          <h3>Buat NFT Kamu</h3>
          <span class="badge">ERC-721</span>
        </div>

        <input type="text" id="nftName" placeholder="Nama NFT" />
        <input type="text" id="nftDesc" placeholder="Deskripsi" />

        <label for="imageFile">
          <div class="upload-area" id="uploadArea">
            <span class="icon">📁</span>
            Tap untuk pilih gambar
          </div>
        </label>
        <input type="file" id="imageFile" accept="image/*" />

        <img id="previewImg" alt="Preview NFT" />

        <div class="progress-wrap" id="progressWrap">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <p class="progress-text" id="progressText">Memulai...</p>
        </div>

        <div class="success-box" id="successBox">
          <h4>✅ NFT Berhasil Di-mint!</h4>
          <p id="txDisplay"></p>
        </div>

        <button class="btn btn-mint" id="mintBtn" disabled>
          <i class="fas fa-rocket"></i> Mint NFT Sekarang
        </button>
        <button class="btn btn-twitter" id="twitterBtn">
          <i class="fab fa-x-twitter"></i> Share ke X
        </button>

        <p id="status"></p>
      </div>
    </div>

    <!-- TAB GALLERY -->
    <div class="tab-panel" id="panel-gallery">
      <div class="gallery-header">
        <h3><i class="fas fa-images"></i> Koleksi NFT</h3>
        <span class="count" id="galleryCount">0 NFT</span>
      </div>
      <div class="nft-grid" id="nftGrid">
        <div class="wallet-required">
          <span class="big-icon">🔗</span>
          <p>Connect wallet dulu untuk lihat koleksi</p>
          <span style="font-size:12px;color:var(--text-muted);">Klik "Connect Wallet" di header</span>
        </div>
      </div>
    </div>

  </div>

  <!-- ================================================================ -->
  <!-- JAVASCRIPT -->
  <!-- ================================================================ -->
  <script>
    // =============================================================
    // 1. KONFIGURASI
    // =============================================================
    const CONFIG = {
      contractAddress: "0x893C81FC7B6dD2FACB1c167147209c5F1c342840",
      rpcUrl: "https://liteforge.rpc.caldera.xyz/http",
      chainId: 4441,
      explorerUrl: "https://liteforge.explorer.caldera.xyz/tx/",
      pinataJwt: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySW5mb3JtYXRpb24iOnsiaWQiOiJiNWE2ODYxZi01NWMwLTQ3ZDktYmM2ZS0zMjBlYWFmMDcyNDYiLCJlbWFpbCI6InJleWhhbmFmaWtyaTExNDBAZ21haWwuY29tIiwiZW1haWxfdmVyaWZpZWQiOnRydWUsInBpbl9wb2xpY3kiOnsicmVnaW9ucyI6W3siZGVzaXJlZFJlcGxpY2F0aW9uQ291bnQiOjEsImlkIjoiRlJBMSJ9LHsiZGVzaXJlZFJlcGxpY2F0aW9uQ291bnQiOjEsImlkIjoiTllDMSJ9XSwidmVyc2lvbiI6MX0sIm1mYV9lbmFibGVkIjpmYWxzZSwic3RhdHVzIjoiQUNUSVZFIn0sImF1dGhlbnRpY2F0aW9uVHlwZSI6InNjb3BlZEtleSIsInNjb3BlZEtleUtleSI6Ijg5ODQ4OTA2ZTVhNDliY2M4ZDEzIiwic2NvcGVkS2V5U2VjcmV0IjoiMDA4NmIwMzljM2NiODE5MmMzYzQ1NzYyM2Y3YzIwNmYyYWQ3Nzg3OWMxNzE4YjJmMjRhZDNiYTQ1MTdmOWViNCIsImV4cCI6MTgxNDAyOTUwMn0.LIWI8NMwgRzLRtumOpKmmv2BHBDJBdmb6_G8dPZvn28"
    };

    const ABI = [
      "function mint(address to, string memory tokenURI) public",
      "function totalSupply() public view returns (uint256)",
      "function tokenURI(uint256 tokenId) public view returns (string)",
      "function ownerOf(uint256 tokenId) public view returns (address)"
    ];

    // =============================================================
    // 2. STATE
    // =============================================================
    let provider, signer, contract;
    let userAddress = null;
    let lastTxHash = null;
    let lastNftName = '';
    let isMinting = false;
    let isConnected = false;

    // =============================================================
    // 3. DOM REFS
    // =============================================================
    const $ = id => document.getElementById(id);
    const connectBtn = $('connectBtn');
    const walletDisplay = $('walletDisplay');
    const totalSupplyEl = $('totalSupply');
    const galleryCount = $('galleryCount');
    const nftGrid = $('nftGrid');
    const mintBtn = $('mintBtn');
    const nftName = $('nftName');
    const nftDesc = $('nftDesc');
    const imageFile = $('imageFile');
    const previewImg = $('previewImg');
    const uploadArea = $('uploadArea');
    const progressWrap = $('progressWrap');
    const progressFill = $('progressFill');
    const progressText = $('progressText');
    const successBox = $('successBox');
    const txDisplay = $('txDisplay');
    const statusEl = $('status');
    const twitterBtn = $('twitterBtn');
    const themeToggle = $('themeToggle');
    const htmlRoot = document.getElementById('htmlRoot');

    // =============================================================
    // 4. THEME TOGGLE
    // =============================================================
    let currentTheme = localStorage.getItem('theme') || 'dark';
    if (currentTheme === 'dark') {
      htmlRoot.setAttribute('data-theme', 'dark');
      themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
    } else {
      htmlRoot.removeAttribute('data-theme');
      themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
    }

    themeToggle.addEventListener('click', () => {
      const isDark = htmlRoot.getAttribute('data-theme') === 'dark';
      if (isDark) {
        htmlRoot.removeAttribute('data-theme');
        themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
        localStorage.setItem('theme', 'light');
      } else {
        htmlRoot.setAttribute('data-theme', 'dark');
        themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        localStorage.setItem('theme', 'dark');
      }
    });

    // =============================================================
    // 5. UTILITY
    // =============================================================
    function setProgress(pct, text) {
      progressWrap.style.display = 'block';
      progressFill.style.width = pct + '%';
      progressText.textContent = text;
    }

    function hideProgress() {
      progressWrap.style.display = 'none';
      progressFill.style.width = '0%';
    }

    function showStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.style.color = isError ? '#ef4444' : 'var(--text-secondary)';
    }

    function truncateAddress(addr) {
      if (!addr) return '-';
      return addr.slice(0, 6) + '...' + addr.slice(-4);
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // =============================================================
    // 6. READ PROVIDER (PUBLIC)
    // =============================================================
    let readProvider, readContract;
    try {
      readProvider = new ethers.providers.JsonRpcProvider(
        CONFIG.rpcUrl,
        { chainId: CONFIG.chainId, name: 'LitVM' }
      );
      readContract = new ethers.Contract(CONFIG.contractAddress, ABI, readProvider);
    } catch (e) {
      console.warn('Read provider error:', e);
    }

    // =============================================================
    // 7. IPFS UPLOAD
    // =============================================================
    async function uploadToIPFS(file) {
      try {
        const formData = new FormData();
        formData.append('file', file);
        
        const res = await fetch('https://api.pinata.cloud/pinning/pinFileToIPFS', {
          method: 'POST',
          headers: { Authorization: `Bearer ${CONFIG.pinataJwt}` },
          body: formData
        });
        
        if (!res.ok) {
          const err = await res.text();
          throw new Error(`Pinata error: ${res.status} - ${err}`);
        }
        
        const data = await res.json();
        if (!data.IpfsHash) throw new Error('No IPFS hash returned');
        return `https://ipfs.io/ipfs/${data.IpfsHash}`;
      } catch (err) {
        console.error('Upload file error:', err);
        throw new Error('Gagal upload gambar: ' + err.message);
      }
    }

    async function uploadMetadata(name, description, imageUrl) {
      try {
        const metadata = { 
          name: name || 'Portal NFT', 
          description: description || 'NFT dari LitVM Testnet', 
          image: imageUrl 
        };
        
        const res = await fetch('https://api.pinata.cloud/pinning/pinJSONToIPFS', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${CONFIG.pinataJwt}`
          },
          body: JSON.stringify({ pinataContent: metadata })
        });
        
        if (!res.ok) {
          const err = await res.text();
          throw new Error(`Pinata error: ${res.status} - ${err}`);
        }
        
        const data = await res.json();
        if (!data.IpfsHash) throw new Error('No IPFS hash returned');
        return `https://ipfs.io/ipfs/${data.IpfsHash}`;
      } catch (err) {
        console.error('Upload metadata error:', err);
        throw new Error('Gagal upload metadata: ' + err.message);
      }
    }

    // =============================================================
    // 8. GALLERY LOAD - HANYA NFT MILIK WALLET
    // =============================================================
    async function loadGallery() {
      if (!isConnected || !userAddress) {
        nftGrid.innerHTML = `
          <div class="wallet-required">
            <span class="big-icon">🔗</span>
            <p>Connect wallet dulu untuk lihat koleksi</p>
            <span style="font-size:12px;color:var(--text-muted);">Klik "Connect Wallet" di header</span>
          </div>
        `;
        totalSupplyEl.textContent = '?';
        galleryCount.textContent = '? NFT';
        return;
      }

      try {
        if (!readContract) {
          nftGrid.innerHTML = `
            <div class="empty-gallery">
              <span class="big-icon">⚠️</span>
              <p>Gagal terhubung ke blockchain</p>
            </div>
          `;
          return;
        }

        const total = await readContract.totalSupply();
        const totalNum = Number(total);
        totalSupplyEl.textContent = totalNum;

        // Cari semua NFT yang owner-nya = userAddress
        let myNfts = [];
        for (let i = 0; i < totalNum; i++) {
          try {
            const owner = await readContract.ownerOf(i);
            if (owner.toLowerCase() === userAddress.toLowerCase()) {
              myNfts.push(i);
            }
          } catch (e) {
            console.warn('Gagal cek owner NFT #' + i, e.message);
          }
        }

        const myNftCount = myNfts.length;
        galleryCount.textContent = myNftCount + ' NFT';

        if (myNftCount === 0) {
          nftGrid.innerHTML = `
            <div class="empty-gallery">
              <span class="big-icon">🖼️</span>
              <p>Kamu belum punya NFT</p>
              <span style="font-size:12px;font-weight:400;">Mint NFT pertama kamu!</span>
            </div>
          `;
          return;
        }

        nftGrid.innerHTML = '<div class="loading-gallery"><i class="fas fa-spinner fa-spin"></i> Memuat NFT...</div>';

        let html = '';
        let successCount = 0;

        for (const tokenId of myNfts) {
          try {
            const owner = await readContract.ownerOf(tokenId);
            let imageUrl = `https://via.placeholder.com/300/7c3aed/ffffff?text=NFT+%23${tokenId}`;
            let name = `Portal NFT #${tokenId}`;

            try {
              let tokenUri = await readContract.tokenURI(tokenId);
              if (tokenUri && tokenUri.startsWith('ipfs://')) {
                tokenUri = tokenUri.replace('ipfs://', 'https://ipfs.io/ipfs/');
              }

              const res = await fetch(tokenUri, {
                signal: AbortSignal.timeout(5000)
              });
              if (res.ok) {
                const meta = await res.json();
                if (meta.image) {
                  imageUrl = meta.image;
                  if (imageUrl.startsWith('ipfs://')) {
                    imageUrl = imageUrl.replace('ipfs://', 'https://ipfs.io/ipfs/');
                  }
                }
                if (meta.name) name = meta.name;
              }
            } catch (e) {
              console.warn('Gagal load metadata NFT #' + tokenId, e.message);
            }

            html += `
              <div class="nft-card">
                <img src="${imageUrl}" alt="${name}" 
                     onerror="this.src='https://via.placeholder.com/300/7c3aed/ffffff?text=Error'" />
                <div class="info">
                  <span class="token-id">#${tokenId}</span>
                  <div class="name">${name}</div>
                  <div class="owner">👤 ${truncateAddress(owner)}</div>
                </div>
              </div>
            `;
            successCount++;
          } catch (e) {
            console.warn('Gagal load NFT #' + tokenId, e.message);
          }
        }

        if (successCount === 0) {
          nftGrid.innerHTML = `
            <div class="empty-gallery">
              <span class="big-icon">⚠️</span>
              <p>Gagal memuat NFT</p>
              <span style="font-size:12px;font-weight:400;">Coba refresh halaman</span>
            </div>
          `;
        } else {
          nftGrid.innerHTML = html;
        }

      } catch (err) {
        console.error('Gallery error:', err);
        nftGrid.innerHTML = `
          <div class="empty-gallery">
            <span class="big-icon">⚠️</span>
            <p>Gagal terhubung ke blockchain</p>
            <span style="font-size:12px;font-weight:400;">${err.message || 'Cek koneksi internet'}</span>
          </div>
        `;
      }
    }

    // =============================================================
    // 9. SWITCH TAB
    // =============================================================
    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[data-tab="${tabName}"]`).classList.add('active');
      
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + tabName).classList.add('active');
      
      if (tabName === 'gallery') loadGallery();
    }

    // =============================================================
    // 10. PREVIEW GAMBAR
    // =============================================================
    imageFile.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          previewImg.src = ev.target.result;
          previewImg.style.display = 'block';
          uploadArea.innerHTML = '<span class="icon">✅</span> ' + file.name;
        };
        reader.readAsDataURL(file);
        if (userAddress) mintBtn.disabled = false;
      }
    });

    // =============================================================
    // 11. CONNECT / DISCONNECT WALLET (TOGGLE)
    // =============================================================
    connectBtn.addEventListener('click', async () => {
      if (isConnected) {
        userAddress = null;
        isConnected = false;
        signer = null;
        contract = null;
        connectBtn.innerHTML = '<i class="fas fa-wallet"></i> Connect Wallet';
        connectBtn.classList.remove('connected');
        walletDisplay.textContent = '-';
        mintBtn.disabled = true;
        totalSupplyEl.textContent = '?';
        galleryCount.textContent = '? NFT';
        nftGrid.innerHTML = `
          <div class="wallet-required">
            <span class="big-icon">🔗</span>
            <p>Connect wallet dulu untuk lihat koleksi</p>
            <span style="font-size:12px;color:var(--text-muted);">Klik "Connect Wallet" di header</span>
          </div>
        `;
        showStatus('👋 Wallet terputus', true);
        return;
      }

      try {
        if (!window.ethereum) {
          alert('⚠️ Install MetaMask atau wallet Web3!');
          return;
        }

        const chainId = await window.ethereum.request({ method: 'eth_chainId' });
        if (parseInt(chainId) !== CONFIG.chainId) {
          try {
            await window.ethereum.request({
              method: 'wallet_switchEthereumChain',
              params: [{ chainId: '0x' + CONFIG.chainId.toString(16) }],
            });
          } catch (switchError) {
            if (switchError.code === 4902) {
              await window.ethereum.request({
                method: 'wallet_addEthereumChain',
                params: [{
                  chainId: '0x' + CONFIG.chainId.toString(16),
                  chainName: 'LitVM Testnet',
                  rpcUrls: [CONFIG.rpcUrl],
                  nativeCurrency: { name: 'tLit', symbol: 'tLIT', decimals: 18 },
                  blockExplorerUrls: ['https://liteforge.explorer.caldera.xyz'],
                }],
              });
            } else {
              throw switchError;
            }
          }
        }

        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send('eth_requestAccounts', []);
        signer = provider.getSigner();
        userAddress = await signer.getAddress();
        contract = new ethers.Contract(CONFIG.contractAddress, ABI, signer);
        isConnected = true;

        connectBtn.innerHTML = '<i class="fas fa-check-circle"></i> ' + truncateAddress(userAddress) + ' ✕';
        connectBtn.classList.add('connected');
        walletDisplay.textContent = truncateAddress(userAddress);
        mintBtn.disabled = false;

        await loadGallery();
        showStatus('✅ Wallet terhubung!');

      } catch (err) {
        console.error('Connect error:', err);
        showStatus('❌ Gagal konek wallet: ' + err.message, true);
      }
    });

    // =============================================================
    // 12. MINT NFT
    // =============================================================
    mintBtn.addEventListener('click', async () => {
      if (isMinting) return;
      
      const name = nftName.value.trim() || 'Portal NFT';
      const desc = nftDesc.value.trim() || 'NFT dari LitVM Testnet';
      const file = imageFile.files[0];

      if (!file) {
        showStatus('⚠️ Pilih gambar dulu!', true);
        return;
      }
      if (!userAddress) {
        showStatus('⚠️ Konek wallet dulu!', true);
        return;
      }

      isMinting = true;
      mintBtn.disabled = true;
      successBox.style.display = 'none';
      twitterBtn.style.display = 'none';
      hideProgress();
      showStatus('');

      try {
        setProgress(10, '⏳ Persiapan...');
        await sleep(300);

        setProgress(20, '⏳ Upload gambar ke IPFS...');
        const imageUrl = await uploadToIPFS(file);
        setProgress(50, '✅ Gambar terupload!');

        setProgress(55, '⏳ Upload metadata...');
        const metadataUrl = await uploadMetadata(name, desc, imageUrl);
        setProgress(75, '✅ Metadata terupload!');

        setProgress(80, '⏳ Minting ke blockchain...');
        
        let gasLimit = 3000000;
        try {
          const gasEstimate = await contract.estimateGas.mint(userAddress, metadataUrl);
          gasLimit = gasEstimate.mul(120).div(100).toNumber();
          if (gasLimit < 100000) gasLimit = 3000000;
        } catch (e) {
          console.warn('Gas estimation failed, using default:', e.message);
        }

        const tx = await contract.mint(userAddress, metadataUrl, {
          gasLimit: gasLimit
        });
        
        setProgress(90, '⏳ Menunggu konfirmasi (30-60 detik)...');
        await tx.wait();
        
        setProgress(100, '✅ Selesai!');
        lastTxHash = tx.hash;
        lastNftName = name;

        successBox.style.display = 'block';
        const explorerLink = CONFIG.explorerUrl + tx.hash;
        txDisplay.innerHTML = `
          ✅ Transaksi berhasil! 
          <a href="${explorerLink}" target="_blank" class="tx-link">Lihat di Explorer →</a>
        `;
        
        twitterBtn.style.display = 'block';
        showStatus('🎉 NFT berhasil di-mint!');

        nftName.value = '';
        nftDesc.value = '';
        imageFile.value = '';
        previewImg.style.display = 'none';
        uploadArea.innerHTML = '<span class="icon">📁</span> Tap untuk pilih gambar';
        mintBtn.disabled = true;

        loadGallery();

      } catch (err) {
        console.error('Mint error:', err);
        hideProgress();
        
        let errorMsg = err.message;
        if (errorMsg.includes('insufficient funds')) {
          errorMsg = '⚠️ Saldo tLIT tidak cukup! Dapatkan tLIT dari faucet LitVM.';
        } else if (errorMsg.includes('user rejected')) {
          errorMsg = '⚠️ Transaksi dibatalkan di wallet.';
        } else if (errorMsg.includes('Pinata')) {
          errorMsg = '⚠️ Gagal upload ke IPFS. Cek PINATA_JWT di kode.';
        }
        showStatus('❌ ' + errorMsg, true);
      } finally {
        isMinting = false;
        if (userAddress && imageFile.files[0]) {
          mintBtn.disabled = false;
        }
        setTimeout(hideProgress, 3000);
      }
    });

    // =============================================================
    // 13. SHARE KE X (TWITTER)
    // =============================================================
    twitterBtn.addEventListener('click', function() {
      if (!lastTxHash) {
        showStatus('⚠️ Belum ada transaksi untuk di-share', true);
        return;
      }
      
      const text = encodeURIComponent(
        `🎉 Baru aja mint NFT "${lastNftName}" di Portal NFT!\n\n` +
        `🔗 Lihat transaksi: ${CONFIG.explorerUrl}${lastTxHash}\n\n` +
        `🚀 Mint juga di: ${window.location.href}\n\n` +
        `#PortalNFT #LitVM #Web3 #NFT`
      );
      
      const url = `https://twitter.com/intent/tweet?text=${text}`;
      window.open(url, '_blank', 'width=600,height=400');
    });

    // =============================================================
    // 14. AUTO CHECK WALLET CONNECTION
    // =============================================================
    (async function checkConnection() {
      try {
        if (window.ethereum) {
          const accounts = await window.ethereum.request({ method: 'eth_accounts' });
          if (accounts.length > 0) {
            await connectBtn.click();
          } else {
            loadGallery();
          }
        } else {
          loadGallery();
        }
      } catch (e) {
        console.log('Auto-connect skipped:', e.message);
        loadGallery();
      }
    })();

    // =============================================================
    // 15. EVENT LISTENER WALLET
    // =============================================================
    if (window.ethereum) {
      window.ethereum.on('accountsChanged', (accounts) => {
        if (accounts.length === 0) {
          userAddress = null;
          isConnected = false;
          connectBtn.innerHTML = '<i class="fas fa-wallet"></i> Connect Wallet';
          connectBtn.classList.remove('connected');
          walletDisplay.textContent = '-';
          mintBtn.disabled = true;
          totalSupplyEl.textContent = '?';
          galleryCount.textContent = '? NFT';
          nftGrid.innerHTML = `
            <div class="wallet-required">
              <span class="big-icon">🔗</span>
              <p>Connect wallet dulu untuk lihat koleksi</p>
              <span style="font-size:12px;color:var(--text-muted);">Klik "Connect Wallet" di header</span>
            </div>
          `;
          showStatus('👋 Wallet terputus', true);
        } else {
          connectBtn.click();
        }
      });

      window.ethereum.on('chainChanged', () => {
        window.location.reload();
      });
    }

    console.log('🚀 Portal NFT siap!');
    console.log('✅ JWT sudah terisi!');
    console.log('🌙 Klik ikon bulan/matahari untuk ganti tema!');
    console.log('🔗 Explorer URL: ' + CONFIG.explorerUrl);
  </script>

</body>
</html>
