<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal NFT - Web3 Creative Studio</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  
  <style>
    :root {
      --primary: #22C55E; --secondary: #16A34A; --accent: #4ADE80;
      --bg-body: #07130C; --bg-surface: #0F1E16; --bg-card: #16251D;
      --border-color: #21412E; --hover-color: #2DD46F;
      --success: #22C55E; --danger: #ef4444;
      --text-primary: #F8FAFC; --text-secondary: #A7B8AF; --text-muted: #64748b;
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
      --transition: all 0.3s ease;
      --font-ui: 'Inter', sans-serif; --font-display: 'Space Grotesk', sans-serif;
    }
    body.light-mode {
      --primary: #16A34A; --secondary: #15803D; --bg-body: #F0FDF4; 
      --bg-surface: #FFFFFF; --bg-card: #F8FAFC; --border-color: #DCFCE7;
      --text-primary: #022C22; --text-secondary: #065F46;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-ui); background: var(--bg-body); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; transition: var(--transition); }
    
    /* Header */
    .header { background: var(--bg-surface); border-bottom: 1px solid var(--border-color); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; transition: var(--transition); }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-img-mask { width: 42px; height: 42px; background-color: var(--primary); -webkit-mask: url('1000008981.png') no-repeat center / contain; mask: url('1000008981.png') no-repeat center / contain; }
    .logo-text-group { display: flex; flex-direction: column; }
    .logo-text { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text-primary); }
    .logo-status { font-size: 11px; color: var(--primary); font-weight: 600; }
    
    .nav-links { display: flex; gap: 8px; }
    .nav-link { background: transparent; border: none; color: var(--text-secondary); font-family: var(--font-display); font-size: 14px; padding: 8px 16px; cursor: pointer; transition: var(--transition); text-transform: uppercase; }
    .nav-link.active { color: var(--primary); background: rgba(34, 197, 94, 0.1); border-radius: var(--radius-sm); }
    
    .btn { padding: 12px 24px; border-radius: var(--radius-md); border: none; font-weight: 600; cursor: pointer; transition: var(--transition); }
    .btn-primary { background: var(--primary); color: #fff; }
    
    /* Main Content */
    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; flex: 1; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    
    .card { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 24px; }

    /* Footer */
    .cyber-footer { padding: 40px 20px; border-top: 1px solid var(--border-color); background: var(--bg-surface); text-align: center; margin-top: auto; }
    .footer-socials { display: flex; justify-content: center; gap: 16px; margin-bottom: 12px; }
    .footer-socials a { color: var(--text-secondary); font-size: 20px; transition: var(--transition); }
    .footer-socials a:hover { color: var(--primary); }
    .footer-credits { font-size: 13px; color: var(--text-secondary); }
    .footer-credits a { color: var(--primary); text-decoration: none; font-weight: 600; }

    @media (max-width: 640px) { .nav-links { display: none; } .mobile-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-surface); border-top: 1px solid var(--border-color); z-index: 100; padding: 15px; justify-content: space-around; } }
    @media (min-width: 641px) { .mobile-nav { display: none; } }
  </style>
</head>
<body>

  <header class="header">
    <a href="#" class="logo">
      <div class="logo-img-mask"></div>
      <div class="logo-text-group">
        <div class="logo-text">Portal NFT</div>
        <div class="logo-status"><i class="fas fa-circle-dot"></i> LitVM Live</div>
      </div>
    </a>
    <div class="nav-links">
      <button class="nav-link active" onclick="switchTab('mint')">Studio</button>
      <button class="nav-link" onclick="switchTab('gallery')">Gallery</button>
      <button class="nav-link" onclick="switchTab('market')">Market</button>
    </div>
    <div class="header-controls">
      <button class="icon-btn" id="themeToggle" onclick="toggleTheme()"><i class="fas fa-sun"></i></button>
      <button class="btn btn-primary wallet-btn" id="connectBtn">Connect Wallet</button>
    </div>
  </header>

  <div class="mobile-nav">
    <button class="nav-link active" onclick="switchTab('mint')"><i class="fas fa-pen-nib"></i></button>
    <button class="nav-link" onclick="switchTab('gallery')"><i class="fas fa-images"></i></button>
    <button class="nav-link" onclick="switchTab('market')"><i class="fas fa-store"></i></button>
  </div>

  <div class="container">
    <div class="tab-panel active" id="panel-mint">
        <div class="card">
            <h2>Creative Studio</h2>
            <p>Mint your pixel art to LitVM.</p>
            </div>
    </div>
    <div class="tab-panel" id="panel-gallery"><h2>Gallery</h2></div>
    <div class="tab-panel" id="panel-market"><h2>Marketplace</h2></div>
  </div>

  <footer class="cyber-footer">
    <div class="footer-socials">
      <a href="https://x.com/catyaphunter" target="_blank"><i class="fab fa-x-twitter"></i></a>
      <a href="https://github.com/catyap1140/litnft-minter" target="_blank"><i class="fab fa-github"></i></a>
    </div>
    <div class="footer-credits">
      © <span id="currentYear"></span> Portal NFT. Built by <a href="https://x.com/catyaphunter" target="_blank">@catyaphunter</a> on LitVM Testnet.
    </div>
  </footer>

  <script>
    document.getElementById('currentYear').textContent = new Date().getFullYear();
    
    function toggleTheme() {
      document.body.classList.toggle('light-mode');
      const icon = document.querySelector('#themeToggle i');
      icon.className = document.body.classList.contains('light-mode') ? 'fas fa-moon' : 'fas fa-sun';
    }

    function switchTab(name) {
      document.querySelectorAll('.nav-link').forEach(t => t.classList.remove('active'));
      document.querySelectorAll(`.nav-link[onclick="switchTab('${name}')"]`).forEach(t => t.classList.add('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-'+name).classList.add('active');
    }
  </script>
</body>
</html>
