<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LitNFT Minter</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f0f0; color: #1a1a1a; min-height: 100vh; }

    /* HEADER */
    .header { background: #1a1a2e; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo span { font-size: 22px; font-weight: 900; color: #fff; letter-spacing: -1px; }
    .logo em { color: #a78bfa; font-style: normal; }
    .wallet-pill { background: #2a1a4e; border: 1px solid #7c3aed; border-radius: 20px; padding: 8px 16px; font-size: 12px; color: #a78bfa; cursor: pointer; font-weight: 600; }
    .wallet-pill.connected { background: #7c3aed; color: #fff; border-color: #7c3aed; }

    /* STATS BANNER */
    .stats-banner { background: linear-gradient(135deg, #7c3aed, #4f46e5); padding: 20px; margin: 0; }
    .stats-banner h2 { font-size: 22px; font-weight: 900; color: #fff; text-transform: uppercase; margin-bottom: 16px; letter-spacing: 1px; }
    .stats-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .stat-row { background: rgba(255,255,255,0.15); border-radius: 10px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
    .stat-row span { font-size: 13px; color: #e9d5ff; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-row strong { font-size: 18px; color: #fff; font-weight: 900; }

    /* TABS */
    .tabs { display: flex; background: #fff; border-bottom: 2px solid #e5e7eb; }
    .tab { flex: 1; padding: 14px; text-align: center; font-size: 13px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; }
    .tab.active { color: #7c3aed; border-bottom-color: #7c3aed; }

    /* CONTENT */
    .container { padding: 16px; max-width: 480px; margin: 0 auto; }

    /* MINT CARD */
    .mint-card { background: #e8e4ff; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 2px solid #c4b5fd; }
    .mint-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .mint-card-header h3 { font-size: 16px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; color: #4c1d95; }
    .mint-badge { background: #7c3aed; color: #fff; border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    input[type="text"] { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #c4b5fd; background: #fff; color: #1a1a1a; font-size: 14px; margin-bottom: 10px; outline: none; font-weight: 500; }
    input[type="text"]:focus { border-color: #7c3aed; }
    .upload-area { width: 100%; padding: 18px; border-radius: 10px; border: 2px dashed #7c3aed; background: #fff; color: #7c3aed; font-size: 13px; text-align: center; cursor: pointer; margin-bottom: 10px; font-weight: 600; }
    input[type="file"] { display: none; }
    #previewImg { width: 100%; border-radius: 12px; margin-bottom: 10px; display: none; max-height: 250px; object-fit: cover; border: 2px solid #c4b5fd; }

    /* PROGRESS */
    .progress { display: none; margin-bottom: 10px; }
    .progress-bar { height: 8px; background: #c4b5fd; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #f59e0b); width: 0%; transition: width 0.3s; }
    .progress-text { font-size: 12px; color: #7c3aed; margin-top: 6px; text-align: center; font-weight: 600; }

    /* SUCCESS */
    .success-box { background: #f0fdf4; border: 2px solid #86efac; border-radius: 12px; padding: 14px; margin-bottom: 10px; display: none; }
    .success-box h3 { color: #16a34a; font-size: 14px; margin-bottom: 6px; font-weight: 800; }
    .success-box p { font-size: 11px; color: #6b7280; word-break: break-all; }

    /* BUTTONS */
    .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 15px; cursor: pointer; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; margin-bottom: 8px; }
    .btn-mint { background: linear-gradient(135deg, #7c3aed, #4f46e5); color: #fff; }
    .btn-mint:disabled { background: #d1d5db; color: #9ca3af; cursor: not-allowed; }
    .btn-twitter { background: #1DA1F2; color: #fff; display: none; }
    #status { text-align: center; font-size: 13px; color: #7c3aed; font-weight: 600; min-height: 18px; }

    /* NFT GALLERY */
    .section-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #6b7280; margin-bottom: 12px; }
    .nft-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .nft-card { background: #fff; border-radius: 14px; overflow: hidden; border: 2px solid #e5e7eb; transition: all 0.2s; }
    .nft-card:hover { border-color: #7c3aed; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(124,58,237,0.15); }
    .nft-card img { width: 100%; height: 130px; object-fit: cover; }
    .nft-card-info { padding: 10px; }
    .nft-card-info h3 { font-size: 13px; color: #1a1a1a; font-weight: 800; margin-bottom: 3px; }
    .nft-card-info p { font-size: 11px; color: #9ca3af; font-weight: 500; }
    .nft-card-number { background: #7c3aed; color: #fff; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 4px; }
    .empty-gallery { text-align: center; padding: 40px; color: #9ca3af; grid-column: span 2; }
    .empty-gallery span { font-size: 36px; display: block; margin-bottom: 8px; }
    .empty-gallery p { font-size: 13px; font-weight: 600; }

    /* TAB PANELS */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <span>🖼️ Lit<em>NFT</em></span>
    </div>
    <div class="wallet-pill" id="connectBtn">🔗 Connect Wallet</div>
  </div>

  <!-- STATS BANNER -->
  <div class="stats-banner">
    <h2>Mint NFT, Own The Chain!</h2>
    <div class="stats-grid">
      <div class="stat-row">
        <span>Total NFT Ter-mint</span>
        <strong id="totalSupplyBanner">0</strong>
      </div>
      <div class="stat-row">
        <span>Network</span>
        <strong>LitVM Testnet</strong>
      </div>
      <div class="stat-row">
        <span>Wallet</span>
        <strong id="walletShort">-</strong>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('mint', this)">🚀 Mint</div>
    <div class="tab" onclick="switchTab('gallery', this)">🖼️ Galeri</div>
  </div>

  <div class="container">

    <!-- MINT TAB -->
    <div class="tab-panel active" id="tab-mint">
      <br>
      <div class="mint-card">
        <div class="mint-card-header">
          <h3>Buat NFT Kamu</h3>
          <span class="mint-badge">ERC-721</span>
        </div>
        <input type="text" id="nftName" placeholder="Nama NFT" />
        <input type="text" id="nftDesc" placeholder="Deskripsi NFT" />
        <label for="imageFile">
          <div class="upload-area" id="uploadArea">📁 Tap untuk pilih gambar</div>
        </label>
        <input type="file" id="imageFile" accept="image/*" />
        <img id="previewImg" />
        <div class="progress" id="progressBox">
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <p class="progress-text" id="progressText"></p>
        </div>
        <div class="success-box" id="successBox">
          <h3>✅ NFT Berhasil Di-mint!</h3>
          <p id="txHash"></p>
        </div>
        <button class="btn btn-mint" id="mintBtn" disabled>🚀 Mint NFT Sekarang</button>
        <button class="btn btn-twitter" id="twitterBtn">🐦 Share ke Twitter</button>
        <p id="status"></p>
      </div>
    </div>

    <!-- GALLERY TAB -->
    <div class="tab-panel" id="tab-gallery">
      <br>
      <p class="section-label">Semua NFT di Contract</p>
      <div class="nft-grid" id="nftGrid">
        <div class="empty-gallery">
          <span>🖼️</span>
          <p>Belum ada NFT</p>
        </div>
      </div>
    </div>

  </div>

  <script>
    const CONTRACT_ADDRESS = "0x893C81FC7B6dD2FACB1c167147209c5F1c342840";
    const RPC_URL = "https://liteforge.rpc.caldera.xyz/http";
    const PINATA_JWT = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySW5mb3JtYXRpb24iOnsiaWQiOiJiNWE2ODYxZi01NWMwLTQ3ZDktYmM2ZS0zMjBlYWFmMDcyNDYiLCJlbWFpbCI6InJleWhhbmFmaWtyaTExNDBAZ21haWwuY29tIiwiZW1haWxfdmVyaWZpZWQiOnRydWUsInBpbl9wb2xpY3kiOnsicmVnaW9ucyI6W3siZGVzaXJlZFJlcGxpY2F0aW9uQ291bnQiOjEsImlkIjoiRlJBMSJ9LHsiZGVzaXJlZFJlcGxpY2F0aW9uQ291bnQiOjEsImlkIjoiTllDMSJ9XSwidmVyc2lvbiI6MX0sIm1mYV9lbmFibGVkIjpmYWxzZSwic3RhdHVzIjoiQUNUSVZFIn0sImF1dGhlbnRpY2F0aW9uVHlwZSI6InNjb3BlZEtleSIsInNjb3BlZEtleUtleSI6IjIwYjljODBhMmQ2NjBiZDFkODFmIiwic2NvcGVkS2V5U2VjcmV0IjoiYmM4YzdkZmZhOGU4MmQ1MjM0NTA1MDhjNDQ1MzI0ZjY3OGVmOTdjNDZmYzNjMWI3YzJiM2Y3YmFiNjIxMWQ0OSIsImV4cCI6MTgxNDAwNTI5Mn0.W0JQ9feTkAYhi3jNoW8kIrCYNTZDWKz9bfN11KWRRTc";

    const ABI = [
      "function mint(address to, string memory tokenURI) public",
      "function totalSupply() public view returns (uint256)",
      "function tokenURI(uint256 tokenId) public view returns (string)",
      "function ownerOf(uint256 tokenId) public view returns (address)"
    ];

    const readProvider = new ethers.providers.JsonRpcProvider(
      { url: RPC_URL },
      { chainId: 4441, name: "LitVM LiteForge" }
    );
    const readContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, readProvider);
    let provider, signer, contract, lastTxHash, lastNftName;

    function switchTab(name, el) {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
      el.classList.add("active");
      document.getElementById("tab-" + name).classList.add("active");
      if (name === "gallery") loadGallery();
    }

    function setProgress(pct, text) {
      document.getElementById("progressBox").style.display = "block";
      document.getElementById("progressFill").style.width = pct + "%";
      document.getElementById("progressText").innerText = text;
    }

    document.getElementById("imageFile").onchange = (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = document.getElementById("previewImg");
          img.src = ev.target.result;
          img.style.display = "block";
          document.getElementById("uploadArea").innerText = "✅ " + file.name;
        };
        reader.readAsDataURL(file);
      }
    };

    async function uploadToIPFS(file) {
      const formData = new FormData();
      formData.append("file", file);
      const res = await fetch("https://api.pinata.cloud/pinning/pinFileToIPFS", {
        method: "POST",
        headers: { Authorization: `Bearer ${PINATA_JWT}` },
        body: formData
      });
      const data = await res.json();
      return `https://ipfs.io/ipfs/${data.IpfsHash}`;
    }

    async function uploadMetadata(name, description, imageUrl) {
      const metadata = { name, description, image: imageUrl };
      const res = await fetch("https://api.pinata.cloud/pinning/pinJSONToIPFS", {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${PINATA_JWT}` },
        body: JSON.stringify({ pinataContent: metadata })
      });
      const data = await res.json();
      return `https://ipfs.io/ipfs/${data.IpfsHash}`;
    }

    async function loadGallery() {
      try {
        const total = await readContract.totalSupply();
        document.getElementById("totalSupplyBanner").innerText = total.toString();
        const grid = document.getElementById("nftGrid");
        if (total == 0) {
          grid.innerHTML = `<div class="empty-gallery"><span>🖼️</span><p>Belum ada NFT</p></div>`;
          return;
        }
        grid.innerHTML = "";
        for (let i = 0; i < total; i++) {
          const owner = await readContract.ownerOf(i);
          let imageUrl = `https://via.placeholder.com/150/7c3aed/ffffff?text=NFT+%23${i}`;
          let nftName = `LitNFT #${i}`;
          try {
            const tokenUri = await readContract.tokenURI(i);
            const res = await fetch(tokenUri);
            const meta = await res.json();
            if (meta.image) imageUrl = meta.image;
            if (meta.name) nftName = meta.name;
          } catch(e) {}
          const card = document.createElement("div");
          card.className = "nft-card";
          card.innerHTML = `
            <img src="${imageUrl}" onerror="this.src='https://via.placeholder.com/150/7c3aed/ffffff?text=NFT'" />
            <div class="nft-card-info">
              <div class="nft-card-number">#${i}</div>
              <h3>${nftName}</h3>
              <p>👤 ${owner.slice(0,6)}...${owner.slice(-4)}</p>
            </div>
          `;
          grid.appendChild(card);
        }
      } catch (e) {
        console.error("Gallery error:", e);
      }
    }

    document.getElementById("connectBtn").onclick = async () => {
      if (!window.ethereum) return alert("Install MetaMask/Rabby dulu!");
      provider = new ethers.providers.Web3Provider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      signer = provider.getSigner();
      const address = await signer.getAddress();
      document.getElementById("connectBtn").innerText = address.slice(0,6) + "..." + address.slice(-4);
      document.getElementById("connectBtn").classList.add("connected");
      document.getElementById("walletShort").innerText = address.slice(0,6) + "..." + address.slice(-4);
      contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
      document.getElementById("mintBtn").disabled = false;
      loadGallery();
    };

    document.getElementById("mintBtn").onclick = async () => {
      const name = document.getElementById("nftName").value || "LitNFT";
      const desc = document.getElementById("nftDesc").value || "NFT di LitVM Testnet";
      const file = document.getElementById("imageFile").files[0];
      if (!file) return alert("Pilih gambar dulu!");

      document.getElementById("mintBtn").disabled = true;
      document.getElementById("successBox").style.display = "none";
      document.getElementById("twitterBtn").style.display = "none";

      try {
        setProgress(20, "⏳ Upload gambar ke IPFS...");
        const imageUrl = await uploadToIPFS(file);

        setProgress(50, "⏳ Upload metadata...");
        const metadataUrl = await uploadMetadata(name, desc, imageUrl);

        setProgress(75, "⏳ Minting NFT ke blockchain...");
        const address = await signer.getAddress();
        const tx = await contract.mint(address, metadataUrl);
        await tx.wait();

        setProgress(100, "✅ Selesai!");
        lastTxHash = tx.hash;
        lastNftName = name;

        document.getElementById("successBox").style.display = "block";
        document.getElementById("txHash").innerText = "TX: " + tx.hash;
        document.getElementById("twitterBtn").style.display = "block";
        document.getElementById("mintBtn").disabled = false;
        loadGallery();
      } catch (err) {
        document.getElementById("progressBox").style.display = "none";
        document.getElementById("status").innerText = "❌ Error: " + err.message;
        document.getElementById("mintBtn").disabled = false;
      }
    };

    document.getElementById("twitterBtn").onclick = () => {
      const text = encodeURIComponent(`Baru aja mint NFT "${lastNftName}" di LitVM Testnet! 🎉\n\nTX: ${lastTxHash}\n\nMint juga di: https://catyap1140.github.io/litnft-minter\n\n#LitVM #NFT #Web3`);
      window.open(`https://twitter.com/intent/tweet?text=${text}`, "_blank");
    };

    loadGallery();
  </script>

</body>
</html>
