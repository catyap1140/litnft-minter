<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LitNFT Minter</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5ff; color: #1a1a2e; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #7c3aed, #a78bfa); padding: 28px 20px; text-align: center; }
    .header h1 { font-size: 28px; color: #fff; margin-bottom: 4px; }
    .header p { color: #e9d5ff; font-size: 13px; }
    .container { padding: 20px; max-width: 480px; margin: 0 auto; }
    .card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid #ede9fe; box-shadow: 0 2px 12px rgba(124,58,237,0.07); }
    .wallet-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .wallet-badge { background: #f5f3ff; border: 1px solid #c4b5fd; border-radius: 20px; padding: 6px 14px; font-size: 12px; color: #7c3aed; }
    .section-title { font-size: 12px; color: #9ca3af; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    input[type="text"] { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e5e7eb; background: #fafafa; color: #1a1a2e; font-size: 14px; margin-bottom: 12px; outline: none; }
    input[type="text"]:focus { border-color: #7c3aed; background: #fff; }
    .upload-area { width: 100%; padding: 20px; border-radius: 10px; border: 2px dashed #c4b5fd; background: #f5f3ff; color: #7c3aed; font-size: 13px; text-align: center; cursor: pointer; margin-bottom: 12px; transition: all 0.2s; }
    .upload-area:hover { border-color: #7c3aed; background: #ede9fe; }
    input[type="file"] { display: none; }
    #previewImg { width: 100%; border-radius: 12px; margin-bottom: 12px; display: none; max-height: 300px; object-fit: cover; border: 2px solid #ede9fe; }
    .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 16px; cursor: pointer; font-weight: bold; transition: all 0.2s; margin-bottom: 10px; }
    .btn-primary { background: linear-gradient(135deg, #7c3aed, #a78bfa); color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-mint { background: linear-gradient(135deg, #6d28d9, #7c3aed); color: #fff; }
    .btn-mint:hover { opacity: 0.9; }
    .btn-twitter { background: #1DA1F2; color: #fff; display: none; }
    .btn:disabled { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; }
    #status { text-align: center; margin-top: 8px; font-size: 13px; word-break: break-all; color: #7c3aed; min-height: 20px; }
    .progress { display: none; margin-bottom: 12px; }
    .progress-bar { height: 6px; background: #ede9fe; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #a78bfa); width: 0%; transition: width 0.3s; }
    .progress-text { font-size: 12px; color: #7c3aed; margin-top: 6px; text-align: center; }
    .gallery-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .gallery-header h2 { color: #7c3aed; font-size: 18px; }
    .badge { background: #f5f3ff; color: #7c3aed; border: 1px solid #c4b5fd; border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; }
    .nft-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .nft-card { background: #fafafa; border-radius: 12px; overflow: hidden; border: 1px solid #ede9fe; transition: transform 0.2s, box-shadow 0.2s; }
    .nft-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(124,58,237,0.12); }
    .nft-card img { width: 100%; height: 140px; object-fit: cover; }
    .nft-card-info { padding: 10px; }
    .nft-card-info h3 { font-size: 13px; color: #1a1a2e; margin-bottom: 4px; font-weight: 600; }
    .nft-card-info p { font-size: 11px; color: #9ca3af; }
    .empty-gallery { text-align: center; padding: 40px; color: #c4b5fd; grid-column: span 2; }
    .empty-gallery span { font-size: 40px; display: block; margin-bottom: 8px; }
    .empty-gallery p { color: #9ca3af; font-size: 14px; }
    .success-box { background: #f0fdf4; border: 1px solid #86efac; border-radius: 12px; padding: 16px; margin-bottom: 12px; display: none; }
    .success-box h3 { color: #16a34a; font-size: 14px; margin-bottom: 8px; }
    .success-box p { font-size: 12px; color: #6b7280; word-break: break-all; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🖼️ LitNFT Minter</h1>
    <p>Mint NFT kamu di LitVM Testnet</p>
  </div>

  <div class="container">

    <!-- Wallet -->
    <div class="card">
      <div class="wallet-info">
        <span class="section-title">Wallet</span>
        <span class="wallet-badge" id="walletAddress">Belum terhubung</span>
      </div>
      <button class="btn btn-primary" id="connectBtn">🔗 Connect Wallet</button>
    </div>

    <!-- Mint -->
    <div class="card">
      <p class="section-title">Buat NFT</p>
      <input type="text" id="nftName" placeholder="Nama NFT" />
      <input type="text" id="nftDesc" placeholder="Deskripsi NFT" />
      <label for="imageFile">
        <div class="upload-area" id="uploadArea">📁 Tap untuk pilih gambar</div>
      </label>
      <input type="file" id="imageFile" accept="image/*" />
      <img id="previewImg" />
      <div class="progress" id="progressBox">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <p class="progress-text" id="progressText"></p>
      </div>
      <div class="success-box" id="successBox">
        <h3>✅ NFT Berhasil Di-mint!</h3>
        <p id="txHash"></p>
      </div>
      <button class="btn btn-mint" id="mintBtn" disabled>🚀 Mint NFT</button>
      <button class="btn btn-twitter" id="twitterBtn">🐦 Share ke Twitter</button>
      <p id="status"></p>
    </div>

    <!-- Gallery -->
    <div class="card">
      <div class="gallery-header">
        <h2>📦 Galeri NFT</h2>
        <span class="badge" id="totalSupply">0 NFT</span>
      </div>
      <div class="nft-grid" id="nftGrid">
        <div class="empty-gallery">
          <span>🖼️</span>
          <p>Belum ada NFT</p>
        </div>
      </div>
    </div>

  </div>

  <script>
    const CONTRACT_ADDRESS = "0x893C81FC7B6dD2FACB1c167147209c5F1c342840";
    const RPC_URL = "https://liteforge.rpc.caldera.xyz/http";
    const PINATA_JWT = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySW5mb3JtYXRpb24iOnsiaWQiOiJiNWE2ODYxZi01NWMwLTQ3ZDktYmM2ZS0zMjBlYWFmMDcyNDYiLCJlbWFpbCI6InJleWhhbmFmaWtyaTExNDBAZ21haWwuY29tIiwiZW1haWxfdmVyaWZpZWQiOnRydWUsInBpbl9wb2xpY3kiOnsicmVnaW9ucyI6W3siZGVzaXJlZFJlcGxpY2F0aW9uQ291bnQiOjEsImlkIjoiRlJBMSJ9LHsiZGVzaXJlZFJlcGxpY2F0aW9uQ291bnQiOjEsImlkIjoiTllDMSJ9XSwidmVyc2lvbiI6MX0sIm1mYV9lbmFibGVkIjpmYWxzZSwic3RhdHVzIjoiQUNUSVZFIn0sImF1dGhlbnRpY2F0aW9uVHlwZSI6InNjb3BlZEtleSIsInNjb3BlZEtleUtleSI6IjIwYjljODBhMmQ2NjBiZDFkODFmIiwic2NvcGVkS2V5U2VjcmV0IjoiYmM4YzdkZmZhOGU4MmQ1MjM0NTA1MDhjNDQ1MzI0ZjY3OGVmOTdjNDZmYzNjMWI3YzJiM2Y3YmFiNjIxMWQ0OSIsImV4cCI6MTgxNDAwNTI5Mn0.W0JQ9feTkAYhi3jNoW8kIrCYNTZDWKz9bfN11KWRRTc";

    const ABI = [
      "function mint(address to, string memory tokenURI) public",
      "function totalSupply() public view returns (uint256)",
      "function tokenURI(uint256 tokenId) public view returns (string)",
      "function ownerOf(uint256 tokenId) public view returns (address)"
    ];

    const readProvider = new ethers.providers.JsonRpcProvider(
      { url: RPC_URL },
      { chainId: 4441, name: "LitVM LiteForge" }
    );
    const readContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, readProvider);

    let provider, signer, contract, lastTxHash, lastNftName;

    function setProgress(pct, text) {
      document.getElementById("progressBox").style.display = "block";
      document.getElementById("progressFill").style.width = pct + "%";
      document.getElementById("progressText").innerText = text;
    }

    document.getElementById("imageFile").onchange = (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = document.getElementById("previewImg");
          img.src = ev.target.result;
          img.style.display = "block";
          document.getElementById("uploadArea").innerText = "✅ " + file.name;
        };
        reader.readAsDataURL(file);
      }
    };

    async function uploadToIPFS(file) {
      const formData = new FormData();
      formData.append("file", file);
      const res = await fetch("https://api.pinata.cloud/pinning/pinFileToIPFS", {
        method: "POST",
        headers: { Authorization: `Bearer ${PINATA_JWT}` },
        body: formData
      });
      const data = await res.json();
      return `https://ipfs.io/ipfs/${data.IpfsHash}`;
    }

    async function uploadMetadata(name, description, imageUrl) {
      const metadata = { name, description, image: imageUrl };
      const res = await fetch("https://api.pinata.cloud/pinning/pinJSONToIPFS", {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${PINATA_JWT}` },
        body: JSON.stringify({ pinataContent: metadata })
      });
      const data = await res.json();
      return `https://ipfs.io/ipfs/${data.IpfsHash}`;
    }

    async function loadGallery() {
      try {
        const total = await readContract.totalSupply();
        document.getElementById("totalSupply").innerText = total.toString() + " NFT";
        const grid = document.getElementById("nftGrid");
        if (total == 0) {
          grid.innerHTML = `<div class="empty-gallery"><span>🖼️</span><p>Belum ada NFT</p></div>`;
          return;
        }
        grid.innerHTML = "";
        for (let i = 0; i < total; i++) {
          const owner = await readContract.ownerOf(i);
          let imageUrl = `https://via.placeholder.com/150/7c3aed/ffffff?text=NFT+%23${i}`;
          let nftName = `LitNFT #${i}`;
          try {
            const tokenUri = await readContract.tokenURI(i);
            const res = await fetch(tokenUri);
            const meta = await res.json();
            if (meta.image) imageUrl = meta.image;
            if (meta.name) nftName = meta.name;
          } catch(e) {}
          const card = document.createElement("div");
          card.className = "nft-card";
          card.innerHTML = `
            <img src="${imageUrl}" onerror="this.src='https://via.placeholder.com/150/7c3aed/ffffff?text=NFT'" />
            <div class="nft-card-info">
              <h3>${nftName}</h3>
              <p>👤 ${owner.slice(0,6)}...${owner.slice(-4)}</p>
            </div>
          `;
          grid.appendChild(card);
        }
      } catch (e) {
        console.error("Gallery error:", e);
      }
    }

    document.getElementById("connectBtn").onclick = async () => {
      if (!window.ethereum) return alert("Install MetaMask/Rabby dulu!");
      provider = new ethers.providers.Web3Provider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      signer = provider.getSigner();
      const address = await signer.getAddress();
      document.getElementById("walletAddress").innerText = address.slice(0,6) + "..." + address.slice(-4);
      contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
      document.getElementById("mintBtn").disabled = false;
      loadGallery();
    };

    document.getElementById("mintBtn").onclick = async () => {
      const name = document.getElementById("nftName").value || "LitNFT";
      const desc = document.getElementById("nftDesc").value || "NFT di LitVM Testnet";
      const file = document.getElementById("imageFile").files[0];
      if (!file) return alert("Pilih gambar dulu!");

      document.getElementById("mintBtn").disabled = true;
      document.getElementById("successBox").style.display = "none";
      document.getElementById("twitterBtn").style.display = "none";

      try {
        setProgress(20, "⏳ Upload gambar ke IPFS...");
        const imageUrl = await uploadToIPFS(file);

        setProgress(50, "⏳ Upload metadata...");
        const metadataUrl = await uploadMetadata(name, desc, imageUrl);

        setProgress(75, "⏳ Minting NFT ke blockchain...");
        const address = await signer.getAddress();
        const tx = await contract.mint(address, metadataUrl);
        await tx.wait();

        setProgress(100, "✅ Selesai!");
        lastTxHash = tx.hash;
        lastNftName = name;

        document.getElementById("successBox").style.display = "block";
        document.getElementById("txHash").innerText = "TX: " + tx.hash;
        document.getElementById("twitterBtn").style.display = "block";
        document.getElementById("mintBtn").disabled = false;
        loadGallery();
      } catch (err) {
        document.getElementById("progressBox").style.display = "none";
        document.getElementById("status").innerText = "❌ Error: " + err.message;
        document.getElementById("mintBtn").disabled = false;
      }
    };

    document.getElementById("twitterBtn").onclick = () => {
      const text = encodeURIComponent(`Baru aja mint NFT "${lastNftName}" di LitVM Testnet! 🎉\n\nTX: ${lastTxHash}\n\nMint juga di: https://catyap1140.github.io/litnft-minter\n\n#LitVM #NFT #Web3`);
      window.open(`https://twitter.com/intent/tweet?text=${text}`, "_blank");
    };

    loadGallery();
  </script>

</body>
</html>
