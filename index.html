<!DOCTYPE html>
<html lang="id" id="htmlRoot">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LitNFT Minter Pro</title>
  
  <!-- Ethers.js -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js">
  </script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  
  <style>
    /* ================================================================
       ROOT VARIABLES (LIGHT MODE DEFAULT)
       ================================================================ */
    :root {
      /* Light Mode */
      --bg-body: #f3f4f6;
      --bg-header: linear-gradient(135deg, #1e1b4b, #312e81);
      --bg-card: #ffffff;
      --bg-tab: #ffffff;
      --bg-input: #ffffff;
      --bg-stats: linear-gradient(135deg, #7c3aed, #4f46e5);
      --bg-upload: #faf5ff;
      --bg-upload-hover: #ede9fe;
      --bg-success: #f0fdf4;
      --bg-gallery-card: #ffffff;
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --text-white: #ffffff;
      --text-muted: #9ca3af;
      --text-purple: #7c3aed;
      --border-color: #e5e7eb;
      --border-purple: #ede9fe;
      --shadow-color: rgba(124, 58, 237, 0.1);
      --badge-bg: #7c3aed;
      --badge-text: #ffffff;
    }

    /* ================================================================
       DARK MODE
       ================================================================ */
    [data-theme="dark"] {
      --bg-body: #0f0f1a;
      --bg-header: linear-gradient(135deg, #0a0a1a, #1a1a3e);
      --bg-card: #1a1a2e;
      --bg-tab: #1a1a2e;
      --bg-input: #0f0f1a;
      --bg-stats: linear-gradient(135deg, #4c1d95, #312e81);
      --bg-upload: #1a1a3e;
      --bg-upload-hover: #2a1a4e;
      --bg-success: #0a1a0a;
      --bg-gallery-card: #1a1a2e;
      --text-primary: #f3f4f6;
      --text-secondary: #d1d5db;
      --text-white: #ffffff;
      --text-muted: #6b7280;
      --text-purple: #a78bfa;
      --border-color: #374151;
      --border-purple: #4c1d95;
      --shadow-color: rgba(124, 58, 237, 0.2);
      --badge-bg: #7c3aed;
      --badge-text: #ffffff;
    }

    /* ================================================================
       GLOBAL
       ================================================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }
    
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-body);
      color: var(--text-primary);
      min-height: 100vh;
    }
    
    /* ================================================================
       THEME TOGGLE BUTTON
       ================================================================ */
    .theme-toggle {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #c4b5fd;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 10px;
    }
    
    .theme-toggle:hover {
      background: rgba(255,255,255,0.2);
      transform: rotate(20deg);
    }
    
    .header-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    /* ================================================================
       HEADER
       ================================================================ */
    .header {
      background: var(--bg-header);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
    }
    
    .logo h1 {
      font-size: 22px;
      font-weight: 900;
      color: var(--text-white);
    }
    
    .logo h1 span { color: #a78bfa; }
    
    .wallet-btn {
      background: rgba(255,255,255,0.1);
      border: 2px solid #7c3aed;
      color: #c4b5fd;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }
    
    .wallet-btn:hover {
      background: #7c3aed;
      color: white;
      transform: scale(1.05);
    }
    
    .wallet-btn.connected {
      background: #7c3aed;
      color: white;
      border-color: #7c3aed;
    }
    
    .wallet-btn.connected:hover {
      background: #dc2626;
      border-color: #dc2626;
    }
    
    /* ================================================================
       STATS BANNER
       ================================================================ */
    .stats-banner {
      background: var(--bg-stats);
      padding: 24px 20px;
    }
    
    .stats-banner h2 {
      color: var(--text-white);
      font-size: 20px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }
    
    .stat-item {
      background: rgba(255,255,255,0.15);
      padding: 12px 16px;
      border-radius: 12px;
    }
    
    .stat-item .label {
      font-size: 11px;
      color: #e9d5ff;
      font-weight: 600;
      text-transform: uppercase;
      display: block;
      margin-bottom: 4px;
    }
    
    .stat-item .value {
      font-size: 20px;
      color: var(--text-white);
      font-weight: 900;
    }
    
    /* ================================================================
       TABS
       ================================================================ */
    .tabs {
      display: flex;
      background: var(--bg-tab);
      border-bottom: 2px solid var(--border-color);
      position: sticky;
      top: 72px;
      z-index: 40;
    }
    
    .tab {
      flex: 1;
      padding: 14px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }
    
    .tab.active {
      color: var(--text-purple);
      border-bottom-color: var(--text-purple);
      background: var(--bg-upload);
    }
    
    .tab:hover { color: var(--text-purple); }
    
    /* ================================================================
       CONTAINER
       ================================================================ */
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px;
    }
    
    .tab-panel {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    
    .tab-panel.active { display: block; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* ================================================================
       MINT CARD
       ================================================================ */
    .mint-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 25px var(--shadow-color);
      border: 2px solid var(--border-purple);
    }
    
    .mint-card .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .mint-card .card-header h3 {
      font-size: 18px;
      font-weight: 900;
      color: var(--text-purple);
    }
    
    .badge {
      background: var(--badge-bg);
      color: var(--badge-text);
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    
    .mint-card input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 12px;
      transition: all 0.3s;
      outline: none;
      background: var(--bg-input);
      color: var(--text-primary);
    }
    
    .mint-card input[type="text"]:focus {
      border-color: var(--text-purple);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
    }
    
    .upload-area {
      width: 100%;
      padding: 20px;
      border: 2px dashed var(--text-purple);
      border-radius: 12px;
      background: var(--bg-upload);
      text-align: center;
      cursor: pointer;
      font-weight: 600;
      color: var(--text-purple);
      transition: all 0.3s;
      margin-bottom: 12px;
    }
    
    .upload-area:hover {
      background: var(--bg-upload-hover);
      border-color: #5b21b6;
    }
    
    .upload-area .icon {
      font-size: 28px;
      display: block;
      margin-bottom: 4px;
    }
    
    input[type="file"] { display: none; }
    
    #previewImg {
      width: 100%;
      max-height: 250px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 12px;
      display: none;
      border: 3px solid var(--border-purple);
    }
    
    /* PROGRESS */
    .progress-wrap {
      display: none;
      margin-bottom: 12px;
    }
    
    .progress-bar {
      height: 8px;
      background: var(--border-purple);
      border-radius: 4px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--text-purple), #f59e0b);
      width: 0%;
      transition: width 0.5s ease;
    }
    
    .progress-text {
      font-size: 12px;
      color: var(--text-purple);
      font-weight: 600;
      margin-top: 6px;
      text-align: center;
    }
    
    /* SUCCESS */
    .success-box {
      background: var(--bg-success);
      border: 2px solid #86efac;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      display: none;
    }
    
    .success-box h4 {
      color: #16a34a;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    
    .success-box p {
      font-size: 11px;
      color: var(--text-secondary);
      word-break: break-all;
    }
    
    .success-box .tx-link {
      color: var(--text-purple);
      text-decoration: underline;
      font-weight: 600;
    }
    
    /* BUTTONS */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn-mint {
      background: linear-gradient(135deg, var(--text-purple), #4f46e5);
      color: white;
    }
    
    .btn-mint:hover:not(:disabled) {
      transform: scale(1.02);
      box-shadow: 0 8px 20px rgba(124,58,237,0.3);
    }
    
    .btn-mint:disabled {
      background: #d1d5db;
      color: #9ca3af;
      cursor: not-allowed;
    }
    
    .btn-twitter {
      background: #1DA1F2;
      color: white;
      margin-top: 8px;
      display: none;
    }
    
    .btn-twitter:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 20px rgba(29,161,242,0.3);
    }
    
    #status {
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      margin-top: 10px;
      min-height: 20px;
      color: var(--text-purple);
    }
    
    /* ================================================================
       GALLERY
       ================================================================ */
    .gallery-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .gallery-header h3 {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-primary);
    }
    
    .gallery-header .count {
      background: var(--bg-upload);
      color: var(--text-purple);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    
    .nft-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    
    .nft-card {
      background: var(--bg-gallery-card);
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid var(--border-color);
      transition: all 0.3s;
    }
    
    .nft-card:hover {
      border-color: var(--text-purple);
      transform: translateY(-4px);
      box-shadow: 0 10px 25px var(--shadow-color);
    }
    
    .nft-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      background: var(--border-purple);
    }
    
    .nft-card .info {
      padding: 12px;
    }
    
    .nft-card .token-id {
      background: var(--badge-bg);
      color: var(--badge-text);
      font-size: 10px;
      font-weight: 800;
      padding: 2px 10px;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 4px;
    }
    
    .nft-card .name {
      font-size: 14px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    
    .nft-card .owner {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
    }
    
    .empty-gallery {
      grid-column: span 2;
      text-align: center;
      padding: 50px 20px;
      color: var(--text-muted);
    }
    
    .empty-gallery .big-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 8px;
    }
    
    .loading-gallery {
      grid-column: span 2;
      text-align: center;
      padding: 40px;
      color: var(--text-purple);
    }
    
    /* ================================================================
       RESPONSIVE
       ================================================================ */
    @media (max-width: 480px) {
      .header { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
      .logo h1 { font-size: 18px; }
      .wallet-btn { font-size: 11px; padding: 8px 14px; }
      .nft-grid { gap: 10px; }
      .nft-card img { height: 120px; }
      .header-controls { gap: 4px; }
      .theme-toggle { width: 34px; height: 34px; font-size: 14px; }
    }
  </style>
</head>
<body>

  <!-- ================================================================
       HEADER
       ================================================================ -->
  <header class="header">
    <div class="logo">
      <h1>🖼️ Lit<span>NFT</span></h1>
    </div>
    <div class="header-controls">
      <button class="theme-toggle" id="themeToggle" title="Toggle Dark/Light Mode">
        <i class="fas fa-moon"></i>
      </button>
      <button class="wallet-btn" id="connectBtn">
        <i class="fas fa-wallet"></i> Connect Wallet
      </button>
    </div>
  </header>

  <!-- ================================================================
       STATS BANNER
       ================================================================ -->
  <section class="stats-banner">
    <h2>✨ Mint NFT, Own The Chain!</h2>
    <div class="stats-grid">
      <div class="stat-item">
        <span class="label">Total NFT</span>
        <span class="value" id="totalSupply">0</span>
      </div>
      <div class="stat-item">
        <span class="label">Network</span>
        <span class="value" style="font-size:14px;">LitVM Testnet</span>
      </div>
      <div class="stat-item">
        <span class="label">Wallet</span>
        <span class="value" id="walletDisplay" style="font-size:14px;">-</span>
      </div>
    </div>
  </section>

  <!-- ================================================================
       TABS
       ================================================================ -->
  <div class="tabs">
    <div class="tab active" data-tab="mint" onclick="switchTab('mint')">
      <i class="fas fa-rocket"></i> Mint
    </div>
    <div class="tab" data-tab="gallery" onclick="switchTab('gallery')">
      <i class="fas fa-images"></i> Galeri
    </div>
  </div>

  <!-- ================================================================
       CONTAINER
       ================================================================ -->
  <div class="container">

    <!-- TAB MINT -->
    <div class="tab-panel active" id="panel-mint">
      <div class="mint-card">
        <div class="card-header">
          <h3>Buat NFT Kamu</h3>
          <span class="badge">ERC-721</span>
        </div>

        <input type="text" id="nftName" placeholder="Nama NFT (contoh: Kucing Keren)" />
        <input type="text" id="nftDesc" placeholder="Deskripsi (contoh: NFT kucing dari LitVM)" />

        <label for="imageFile">
          <div class="upload-area" id="uploadArea">
            <span class="icon">📁</span>
            Tap untuk pilih gambar
          </div>
        </label>
        <input type="file" id="imageFile" accept="image/*" />

        <img id="previewImg" alt="Preview NFT" />

        <div class="progress-wrap" id="progressWrap">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <p class="progress-text" id="progressText">Memulai...</p>
        </div>

        <div class="success-box" id="successBox">
          <h4>✅ NFT Berhasil Di-mint!</h4>
          <p id="txDisplay"></p>
        </div>

        <button class="btn btn-mint" id="mintBtn" disabled>
          <i class="fas fa-rocket"></i> Mint NFT Sekarang
        </button>
        <button class="btn btn-twitter" id="twitterBtn">
          <i class="fab fa-twitter"></i> Share ke Twitter
        </button>

        <p id="status"></p>
      </div>
    </div>

    <!-- TAB GALLERY -->
    <div class="tab-panel" id="panel-gallery">
      <div class="gallery-header">
        <h3><i class="fas fa-images"></i> Koleksi NFT</h3>
        <span class="count" id="galleryCount">0 NFT</span>
      </div>
      <div class="nft-grid" id="nftGrid">
        <div class="empty-gallery">
          <span class="big-icon">🖼️</span>
          <p>Belum ada NFT</p>
          <span style="font-size:12px;font-weight:400;">Mint pertama kamu!</span>
        </div>
      </div>
    </div>

  </div>

  <!-- ================================================================ -->
  <!-- JAVASCRIPT -->
  <!-- ================================================================ -->
  <script>
    // =============================================================
    // 1. KONFIGURASI
    // =============================================================
    const CONFIG = {
      contractAddress: "0x893C81FC7B6dD2FACB1c167147209c5F1c342840",
      rpcUrl: "https://liteforge.rpc.caldera.xyz/http",
      chainId: 4441,
      pinataJwt: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySW5mb3JtYXRpb24iOnsiaWQiOiJiNWE2ODYxZi01NWMwLTQ3ZDktYmM2ZS0zMjBlYWFmMDcyNDYiLCJlbWFpbCI6InJleWhhbmFmaWtyaTExNDBAZ21haWwuY29tIiwiZW1haWxfdmVyaWZpZWQiOnRydWUsInBpbl9wb2xpY3kiOnsicmVnaW9ucyI6W3siZGVzaXJlZFJlcGxpY2F0aW9uQ291bnQiOjEsImlkIjoiRlJBMSJ9LHsiZGVzaXJlZFJlcGxpY2F0aW9uQ291bnQiOjEsImlkIjoiTllDMSJ9XSwidmVyc2lvbiI6MX0sIm1mYV9lbmFibGVkIjpmYWxzZSwic3RhdHVzIjoiQUNUSVZFIn0sImF1dGhlbnRpY2F0aW9uVHlwZSI6InNjb3BlZEtleSIsInNjb3BlZEtleUtleSI6Ijg5ODQ4OTA2ZTVhNDliY2M4ZDEzIiwic2NvcGVkS2V5U2VjcmV0IjoiMDA4NmIwMzljM2NiODE5MmMzYzQ1NzYyM2Y3YzIwNmYyYWQ3Nzg3OWMxNzE4YjJmMjRhZDNiYTQ1MTdmOWViNCIsImV4cCI6MTgxNDAyOTUwMn0.LIWI8NMwgRzLRtumOpKmmv2BHBDJBdmb6_G8dPZvn28"
    };

    const ABI = [
      "function mint(address to, string memory tokenURI) public",
      "function totalSupply() public view returns (uint256)",
      "function tokenURI(uint256 tokenId) public view returns (string)",
      "function ownerOf(uint256 tokenId) public view returns (address)"
    ];

    // =============================================================
    // 2. STATE
    // =============================================================
    let provider, signer, contract;
    let userAddress = null;
    let lastTxHash = null;
    let lastNftName = '';
    let isMinting = false;
    let isConnected = false;

    // =============================================================
    // 3. DOM REFS
    // =============================================================
    const $ = id => document.getElementById(id);
    const connectBtn = $('connectBtn');
    const walletDisplay = $('walletDisplay');
    const totalSupplyEl = $('totalSupply');
    const galleryCount = $('galleryCount');
    const nftGrid = $('nftGrid');
    const mintBtn = $('mintBtn');
    const nftName = $('nftName');
    const nftDesc = $('nftDesc');
    const imageFile = $('imageFile');
    const previewImg = $('previewImg');
    const uploadArea = $('uploadArea');
    const progressWrap = $('progressWrap');
    const progressFill = $('progressFill');
    const progressText = $('progressText');
    const successBox = $('successBox');
    const txDisplay = $('txDisplay');
    const statusEl = $('status');
    const twitterBtn = $('twitterBtn');
    const themeToggle = $('themeToggle');
    const htmlRoot = document.getElementById('htmlRoot');

    // =============================================================
    // 4. THEME TOGGLE (Dark/Light Mode)
    // =============================================================
    // Cek preferensi dari localStorage
    let currentTheme = localStorage.getItem('theme') || 'light';
    if (currentTheme === 'dark') {
      htmlRoot.setAttribute('data-theme', 'dark');
      themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
    }

    themeToggle.addEventListener('click', () => {
      const isDark = htmlRoot.getAttribute('data-theme') === 'dark';
      if (isDark) {
        htmlRoot.removeAttribute('data-theme');
        themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
        localStorage.setItem('theme', 'light');
      } else {
        htmlRoot.setAttribute('data-theme', 'dark');
        themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        localStorage.setItem('theme', 'dark');
      }
    });

    // =============================================================
    // 5. UTILITY
    // =============================================================
    function setProgress(pct, text) {
      progressWrap.style.display = 'block';
      progressFill.style.width = pct + '%';
      progressText.textContent = text;
    }

    function hideProgress() {
      progressWrap.style.display = 'none';
      progressFill.style.width = '0%';
    }

    function showStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.style.color = isError ? '#dc2626' : 'var(--text-purple)';
    }

    function truncateAddress(addr) {
      if (!addr) return '-';
      return addr.slice(0, 6) + '...' + addr.slice(-4);
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // =============================================================
    // 6. READ PROVIDER (TANPA WALLET - PUBLIC)
    // =============================================================
    let readProvider, readContract;
    try {
      readProvider = new ethers.providers.JsonRpcProvider(
        CONFIG.rpcUrl,
        { chainId: CONFIG.chainId, name: 'LitVM' }
      );
      readContract = new ethers.Contract(CONFIG.contractAddress, ABI, readProvider);
    } catch (e) {
      console.warn('Read provider error:', e);
    }

    // =============================================================
    // 7. IPFS UPLOAD
    // =============================================================
    async function uploadToIPFS(file) {
      try {
        const formData = new FormData();
        formData.append('file', file);
        
        const res = await fetch('https://api.pinata.cloud/pinning/pinFileToIPFS', {
          method: 'POST',
          headers: { Authorization: `Bearer ${CONFIG.pinataJwt}` },
          body: formData
        });
        
        if (!res.ok) {
          const err = await res.text();
          throw new Error(`Pinata error: ${res.status} - ${err}`);
        }
        
        const data = await res.json();
        if (!data.IpfsHash) throw new Error('No IPFS hash returned');
        return `https://ipfs.io/ipfs/${data.IpfsHash}`;
      } catch (err) {
        console.error('Upload file error:', err);
        throw new Error('Gagal upload gambar: ' + err.message);
      }
    }

    async function uploadMetadata(name, description, imageUrl) {
      try {
        const metadata = { 
          name: name || 'LitNFT', 
          description: description || 'NFT from LitVM', 
          image: imageUrl 
        };
        
        const res = await fetch('https://api.pinata.cloud/pinning/pinJSONToIPFS', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${CONFIG.pinataJwt}`
          },
          body: JSON.stringify({ pinataContent: metadata })
        });
        
        if (!res.ok) {
          const err = await res.text();
          throw new Error(`Pinata error: ${res.status} - ${err}`);
        }
        
        const data = await res.json();
        if (!data.IpfsHash) throw new Error('No IPFS hash returned');
        return `https://ipfs.io/ipfs/${data.IpfsHash}`;
      } catch (err) {
        console.error('Upload metadata error:', err);
        throw new Error('Gagal upload metadata: ' + err.message);
      }
    }

    // =============================================================
    // 8. GALLERY LOAD (PUBLIC - TANPA WALLET)
    // =============================================================
    async function loadGallery() {
      try {
        if (!readContract) {
          nftGrid.innerHTML = `
            <div class="empty-gallery">
              <span class="big-icon">⚠️</span>
              <p>Gagal terhubung ke blockchain</p>
            </div>
          `;
          return;
        }

        const total = await readContract.totalSupply();
        const totalNum = Number(total);
        totalSupplyEl.textContent = totalNum;
        galleryCount.textContent = totalNum + ' NFT';

        if (totalNum === 0) {
          nftGrid.innerHTML = `
            <div class="empty-gallery">
              <span class="big-icon">🖼️</span>
              <p>Belum ada NFT</p>
              <span style="font-size:12px;font-weight:400;">Mint pertama kamu!</span>
            </div>
          `;
          return;
        }

        nftGrid.innerHTML = '<div class="loading-gallery"><i class="fas fa-spinner fa-spin"></i> Memuat NFT...</div>';

        let html = '';
        let successCount = 0;
        
        for (let i = 0; i < totalNum; i++) {
          try {
            const owner = await readContract.ownerOf(i);
            let imageUrl = `https://via.placeholder.com/300/7c3aed/ffffff?text=NFT+%23${i}`;
            let name = `LitNFT #${i}`;
            
            try {
              let tokenUri = await readContract.tokenURI(i);
              if (tokenUri && tokenUri.startsWith('ipfs://')) {
                tokenUri = tokenUri.replace('ipfs://', 'https://ipfs.io/ipfs/');
              }
              
              const res = await fetch(tokenUri, { 
                signal: AbortSignal.timeout(5000)
              });
              if (res.ok) {
                const meta = await res.json();
                if (meta.image) {
                  imageUrl = meta.image;
                  if (imageUrl.startsWith('ipfs://')) {
                    imageUrl = imageUrl.replace('ipfs://', 'https://ipfs.io/ipfs/');
                  }
                }
                if (meta.name) name = meta.name;
              }
            } catch (e) {
              console.warn('Gagal load metadata NFT #' + i, e.message);
            }

            html += `
              <div class="nft-card">
                <img src="${imageUrl}" alt="${name}" 
                     onerror="this.src='https://via.placeholder.com/300/7c3aed/ffffff?text=Error'" />
                <div class="info">
                  <span class="token-id">#${i}</span>
                  <div class="name">${name}</div>
                  <div class="owner">👤 ${truncateAddress(owner)}</div>
                </div>
              </div>
            `;
            successCount++;
          } catch (e) {
            console.warn('Gagal load NFT #' + i, e.message);
          }
        }

        if (successCount === 0) {
          nftGrid.innerHTML = `
            <div class="empty-gallery">
              <span class="big-icon">⚠️</span>
              <p>Gagal memuat NFT</p>
              <span style="font-size:12px;font-weight:400;">Coba refresh halaman</span>
            </div>
          `;
        } else {
          nftGrid.innerHTML = html;
        }

      } catch (err) {
        console.error('Gallery error:', err);
        nftGrid.innerHTML = `
          <div class="empty-gallery">
            <span class="big-icon">⚠️</span>
            <p>Gagal terhubung ke blockchain</p>
            <span style="font-size:12px;font-weight:400;">${err.message || 'Cek koneksi internet'}</span>
          </div>
        `;
      }
    }

    // =============================================================
    // 9. SWITCH TAB
    // =============================================================
    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[data-tab="${tabName}"]`).classList.add('active');
      
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + tabName).classList.add('active');
      
      if (tabName === 'gallery') loadGallery();
    }

    // =============================================================
    // 10. PREVIEW GAMBAR
    // =============================================================
    imageFile.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          previewImg.src = ev.target.result;
          previewImg.style.display = 'block';
          uploadArea.innerHTML = '<span class="icon">✅</span> ' + file.name;
        };
        reader.readAsDataURL(file);
        if (userAddress) mintBtn.disabled = false;
      }
    });

    // =============================================================
    // 11. CONNECT / DISCONNECT WALLET (TOGGLE)
    // =============================================================
    connectBtn.addEventListener('click', async () => {
      // Jika sudah connect -> DISCONNECT
      if (isConnected) {
        userAddress = null;
        isConnected = false;
        signer = null;
        contract = null;
        connectBtn.innerHTML = '<i class="fas fa-wallet"></i> Connect Wallet';
        connectBtn.classList.remove('connected');
        walletDisplay.textContent = '-';
        mintBtn.disabled = true;
        showStatus('👋 Wallet terputus', true);
        return;
      }

      // Jika belum connect -> CONNECT
      try {
        if (!window.ethereum) {
          alert('⚠️ Install MetaMask atau wallet Web3!');
          return;
        }

        // Cek network
        const chainId = await window.ethereum.request({ method: 'eth_chainId' });
        if (parseInt(chainId) !== CONFIG.chainId) {
          try {
            await window.ethereum.request({
              method: 'wallet_switchEthereumChain',
              params: [{ chainId: '0x' + CONFIG.chainId.toString(16) }],
            });
          } catch (switchError) {
            if (switchError.code === 4902) {
              await window.ethereum.request({
                method: 'wallet_addEthereumChain',
                params: [{
                  chainId: '0x' + CONFIG.chainId.toString(16),
                  chainName: 'LitVM Testnet',
                  rpcUrls: [CONFIG.rpcUrl],
                  nativeCurrency: { name: 'tLit', symbol: 'tLIT', decimals: 18 },
                  blockExplorerUrls: ['https://litvm.calderaexplorer.xyz'],
                }],
              });
            } else {
              throw switchError;
            }
          }
        }

        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send('eth_requestAccounts', []);
        signer = provider.getSigner();
        userAddress = await signer.getAddress();
        contract = new ethers.Contract(CONFIG.contractAddress, ABI, signer);
        isConnected = true;

        connectBtn.innerHTML = '<i class="fas fa-check-circle"></i> ' + truncateAddress(userAddress) + ' ✕';
        connectBtn.classList.add('connected');
        walletDisplay.textContent = truncateAddress(userAddress);
        mintBtn.disabled = false;

        loadGallery();
        showStatus('✅ Wallet terhubung!');

      } catch (err) {
        console.error('Connect error:', err);
        showStatus('❌ Gagal konek wallet: ' + err.message, true);
      }
    });

    // =============================================================
    // 12. MINT NFT
    // =============================================================
    mintBtn.addEventListener('click', async () => {
      if (isMinting) return;
      
      const name = nftName.value.trim() || 'LitNFT';
      const desc = nftDesc.value.trim() || 'NFT dari LitVM Testnet';
      const file = imageFile.files[0];

      if (!file) {
        showStatus('⚠️ Pilih gambar dulu!', true);
        return;
      }
      if (!userAddress) {
        showStatus('⚠️ Konek wallet dulu!', true);
        return;
      }

      isMinting = true;
      mintBtn.disabled = true;
      successBox.style.display = 'none';
      twitterBtn.style.display = 'none';
      hideProgress();
      showStatus('');

      try {
        setProgress(10, '⏳ Persiapan...');
        await sleep(300);

        setProgress(20, '⏳ Upload gambar ke IPFS...');
        const imageUrl = await uploadToIPFS(file);
        setProgress(50, '✅ Gambar terupload!');

        setProgress(55, '⏳ Upload metadata...');
        const metadataUrl = await uploadMetadata(name, desc, imageUrl);
        setProgress(75, '✅ Metadata terupload!');

        setProgress(80, '⏳ Minting ke blockchain...');
        
        let gasLimit = 3000000;
        try {
          const gasEstimate = await contract.estimateGas.mint(userAddress, metadataUrl);
          gasLimit = gasEstimate.mul(120).div(100).toNumber();
          if (gasLimit < 100000) gasLimit = 3000000;
        } catch (e) {
          console.warn('Gas estimation failed, using default:', e.message);
        }

        const tx = await contract.mint(userAddress, metadataUrl, {
          gasLimit: gasLimit
        });
        
        setProgress(90, '⏳ Menunggu konfirmasi (30-60 detik)...');
        await tx.wait();
        
        setProgress(100, '✅ Selesai!');
        lastTxHash = tx.hash;
        lastNftName = name;

        successBox.style.display = 'block';
        txDisplay.innerHTML = `
          TX: <a href="https://litvm.calderaexplorer.xyz/tx/${tx.hash}" 
               target="_blank" class="tx-link">${tx.hash.slice(0,20)}...</a>
        `;
        twitterBtn.style.display = 'block';
        showStatus('🎉 NFT berhasil di-mint!');

        nftName.value = '';
        nftDesc.value = '';
        imageFile.value = '';
        previewImg.style.display = 'none';
        uploadArea.innerHTML = '<span class="icon">📁</span> Tap untuk pilih gambar';
        mintBtn.disabled = true;

        loadGallery();

      } catch (err) {
        console.error('Mint error:', err);
        hideProgress();
        
        let errorMsg = err.message;
        if (errorMsg.includes('insufficient funds')) {
          errorMsg = '⚠️ Saldo tLIT tidak cukup! Dapatkan tLIT dari faucet LitVM.';
        } else if (errorMsg.includes('user rejected')) {
          errorMsg = '⚠️ Transaksi dibatalkan di wallet.';
        } else if (errorMsg.includes('Pinata')) {
          errorMsg = '⚠️ Gagal upload ke IPFS. Cek PINATA_JWT di kode.';
        }
        showStatus('❌ ' + errorMsg, true);
      } finally {
        isMinting = false;
        if (userAddress && imageFile.files[0]) {
          mintBtn.disabled = false;
        }
        setTimeout(hideProgress, 3000);
      }
    });

    // =============================================================
    // 13. SHARE TWITTER
    // =============================================================
    twitterBtn.addEventListener('click', () => {
      const text = encodeURIComponent(
        `Baru aja mint NFT "${lastNftName}" di LitVM Testnet! 🎉\n\n` +
        `TX: ${lastTxHash}\n\n` +
        `Mint juga di: ${window.location.href}\n\n` +
        `#LitVM #NFT #Web3`
      );
      window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
    });

    // =============================================================
    // 14. AUTO LOAD GALLERY (TANPA WALLET)
    // =============================================================
    loadGallery();

    // =============================================================
    // 15. AUTO CHECK WALLET CONNECTION
    // =============================================================
    (async function checkConnection() {
      try {
        if (window.ethereum) {
          const accounts = await window.ethereum.request({ method: 'eth_accounts' });
          if (accounts.length > 0) {
            // Auto connect
            connectBtn.click();
          }
        }
      } catch (e) {
        console.log('Auto-connect skipped:', e.message);
      }
    })();

    // =============================================================
    // 16. EVENT LISTENER WALLET (AKUN BERUBAH)
    // =============================================================
    if (window.ethereum) {
      window.ethereum.on('accountsChanged', (accounts) => {
        if (accounts.length === 0) {
          // Logout
          userAddress = null;
          isConnected = false;
          connectBtn.innerHTML = '<i class="fas fa-wallet"></i> Connect Wallet';
          connectBtn.classList.remove('connected');
          walletDisplay.textContent = '-';
          mintBtn.disabled = true;
          showStatus('👋 Wallet terputus', true);
        } else {
          // Refresh connection
          connectBtn.click();
        }
      });

      window.ethereum.on('chainChanged', () => {
        window.location.reload();
      });
    }

    console.log('🚀 LitNFT Minter siap!');
    console.log('✅ JWT sudah terisi!');
    console.log('🌙 Klik ikon bulan/matahari untuk ganti tema!');
  </script>

</body>
